version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: queuecure-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: queuecure        
      POSTGRES_USER: queuecure       
      POSTGRES_PASSWORD: queuecure
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: queuecure-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: