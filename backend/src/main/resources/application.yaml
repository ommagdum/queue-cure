spring:
  application:
    name: backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/queuecure}
    username: ${DATABASE_USERNAME:queuecure}
    password: ${DATABASE_PASSWORD:queuecure}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  jackson:
    serialization:
      write-dates-as-timestamps: false

clinic:
  default_consult_minutes: ${DEFAULT_CONSULT_MINUTES:10}

server:
  port: ${PORT:8080}
