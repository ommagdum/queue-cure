name: Keep Render Alive
on:
  schedule:
    - cron: '*/7 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        run: |
          curl -f ${{ secrets.RENDER_BACKEND_URL }}/api/v1/queue/stats || echo "Ping failed, service may be starting"
